<section class="b-common__head b-common__section">
<div class="b-common__wrap"><div class="b-common__inner">
<h1 class="b-common__title"><span><span class="is-wave">C<span></span></span>ontact</span></h1>
</div></div>
</section>

<section class="b-common__section">
<div class="b-common__wrap"><div class="b-common__inner" style="max-width:700px;margin:0 auto;">
<p class="b-common__text" style="text-align:center;margin-bottom:3rem;">ご予約・お問い合わせは、以下フォームまたはお電話にて承っております。<br>内容確認後、24時間以内にご連絡いたします。</p>

<form action="https://formspree.io/f/your-form-id" method="POST" style="width:100%;">
<div style="margin-bottom:1.5rem;">
<label style="display:block;font-size:var(--pow0);font-weight:var(--fwb);font-family:var(--jp_min);margin-bottom:0.5rem;">お名前 <span style="color:#c00;font-size:12px;">*必須</span></label>
<input type="text" name="name" required style="width:100%;padding:0.8rem 1rem;border:1px solid var(--Border);font-size:1rem;background:var(--White);">
</div>
<div style="margin-bottom:1.5rem;">
<label style="display:block;font-size:var(--pow0);font-weight:var(--fwb);font-family:var(--jp_min);margin-bottom:0.5rem;">メールアドレス <span style="color:#c00;font-size:12px;">*必須</span></label>
<input type="email" name="_replyto" required style="width:100%;padding:0.8rem 1rem;border:1px solid var(--Border);font-size:1rem;background:var(--White);">
</div>
<div style="margin-bottom:1.5rem;">
<label style="display:block;font-size:var(--pow0);font-weight:var(--fwb);font-family:var(--jp_min);margin-bottom:0.5rem;">電話番号</label>
<input type="tel" name="tel" style="width:100%;padding:0.8rem 1rem;border:1px solid var(--Border);font-size:1rem;background:var(--White);">
</div>
<div style="margin-bottom:1.5rem;">
<label style="display:block;font-size:var(--pow0);font-weight:var(--fwb);font-family:var(--jp_min);margin-bottom:0.5rem;">お問い合わせ種別</label>
<select name="type" style="width:100%;padding:0.8rem 1rem;border:1px solid var(--Border);font-size:1rem;background:var(--White);">
<option value="予約">ご予約</option>
<option value="料金">料金について</option>
<option value="その他">その他</option>
</select>
</div>
<div style="margin-bottom:2rem;">
<label style="display:block;font-size:var(--pow0);font-weight:var(--fwb);font-family:var(--jp_min);margin-bottom:0.5rem;">お問い合わせ内容 <span style="color:#c00;font-size:12px;">*必須</span></label>
<textarea name="message" rows="6" required style="width:100%;padding:0.8rem 1rem;border:1px solid var(--Border);font-size:1rem;background:var(--White);"></textarea>
</div>
<div style="text-align:center;">
<button type="submit" style="background:var(--Key1);color:var(--White);border:none;padding:1rem 3rem;font-size:1rem;cursor:pointer;transition:opacity 0.3s;" onmouseover="this.style.opacity=0.8" onmouseout="this.style.opacity=1">送信する</button>
</div>
</form>
</div></div>
</section>
