<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CAFE DESIGNS</title>
<style>
* { box-sizing:border-box; }
body { margin:0; font-family:-apple-system,"Hiragino Kaku Gothic ProN",sans-serif; color:#221c16; background:#faf9f7; line-height:1.7; }
header { padding:48px 24px 16px; max-width:1000px; margin:0 auto; }
header h1 { font-size:24px; margin:0 0 4px; }
header p { color:#6b6b6b; margin:0; font-size:14px; }
.back { display:inline-block; margin-bottom:16px; font-size:12px; color:#6b6b6b; text-decoration:none; letter-spacing:0.08em; }
.back:hover { color:#221c16; }
.grid { max-width:1000px; margin:0 auto; padding:16px 24px 80px; display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:20px; }
.card { background:#fff; border:1px solid #e7e2d8; border-radius:12px; overflow:hidden; display:flex; flex-direction:column; text-decoration:none; color:inherit; transition:transform .2s; box-shadow:0 1px 2px rgba(33,28,22,.04); }
.card:hover { transform:translateY(-4px); box-shadow:0 24px 44px -26px rgba(33,28,22,.5); border-color:#e7b04b; }
.card .thumb { width:100%; aspect-ratio:16/10; background:#e7e2d8; display:flex; align-items:center; justify-content:center; font-size:36px; color:#6b6b6b; }
.card .body { padding:14px 16px 18px; flex:1; display:flex; flex-direction:column; }
.card .label { font-size:11px; font-weight:600; color:#fff; background:#243b53; padding:2px 10px; border-radius:20px; align-self:flex-start; margin-bottom:6px; }
.card .label.green { background:#0a5; }
.card h2 { font-size:17px; margin:0 0 4px; }
.card p { font-size:13px; color:#6b6b6b; margin:0; flex:1; }
</style>
</head>
<body>
<header>
  <a class="back" href="../index.html">← STORE DESIGNS</a>
  <h1>☕ CAFE DESIGNS</h1>
  <p>カフェ・コーヒー店のデザインサンプル一覧</p>
</header>
<main class="grid">
  <a class="card" href="brooklyn/index.html">
    <div class="thumb">🧱</div>
    <div class="body">
      <span class="label green">完成</span>
      <h2>BRICK & BEANS</h2>
      <p>ブルックリン・インダストリアル。黒・レンガ・ダークグレーの力強いデザイン。</p>
    </div>
  </a>
  <a class="card" href="blacksmith/index.html">
    <div class="thumb">⚒️</div>
    <div class="body">
      <span class="label green">完成</span>
      <h2>BLACKSMITH ROASTERY</h2>
      <p>プレミアムブルックリン。カスタムカーソル・プリローダー・3Dチルト搭載のリッチ版。</p>
    </div>
  </a>
  <a class="card" href="meguri/index.html">
    <div class="thumb">🍃</div>
    <div class="body">
      <span class="label green">完成</span>
      <h2>MEGURI COFFEE</h2>
      <p>表参道・和モダン。白・ベージュ・コーヒーブラウンの落ち着いたスペシャルティコーヒー。</p>
    </div>
  </a>
</main>
</body>
</html>
